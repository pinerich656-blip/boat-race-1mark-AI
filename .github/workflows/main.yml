name: Daily Keirin Data Update

on:
  schedule:
    # 毎日 日本時間の午前8時に実行 (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch: # 手動で動かしたい時用のボタン

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v3

      - name: Pythonのセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 必要なライブラリをインストール
        run: |
          pip install requests beautifulsoup4

      - name: スクレイピング実行
        run: python scraper.py

      - name: 結果をGitHubに保存
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git commit -m "Update data.json" || exit 0
          git push
