
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BOAT RACE 1マーク展開AI PRO ARROWS</title>
<style>
:root{
  --bg:#08111f;
  --bg2:#0d1730;
  --card:#121c33;
  --line:#22304d;
  --text:#ffffff;
  --muted:#9fb0d1;
  --blue:#2563eb;
  --cyan:#06b6d4;
  --green:#16a34a;
  --red:#dc2626;
  --gold:#f59e0b;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.app{max-width:430px;margin:auto;padding:12px}
.card{
  background:var(--card);
  padding:14px;
  margin:10px 0;
  border-radius:16px;
  border:1px solid var(--line);
  box-shadow:0 8px 24px rgba(0,0,0,.18);
}
h1{margin:0;font-size:22px}
.sub{font-size:12px;color:var(--muted);line-height:1.6;margin-top:6px}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  color:#fff;
  font-size:16px;
  font-weight:800;
}
.result{line-height:1.8}
.top-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.small-btn{
  height:44px;
  font-size:14px;
  font-weight:800;
}
.clear-btn{background:#374151}
.badge{
  display:inline-block;
  padding:7px 12px;
  border-radius:999px;
  margin:4px 4px 0 0;
  font-weight:800;
  font-size:13px;
}
.good{background:var(--green)}
.warn{background:var(--red)}
.tip{background:var(--blue)}
.gold{background:var(--gold);color:#111}
.head-grid,.row-grid{
  display:grid;
  grid-template-columns:42px repeat(4,1fr);
  gap:8px;
  align-items:center;
  margin-top:8px;
}
.head-cell{
  text-align:center;
  font-size:12px;
  color:var(--muted);
  font-weight:700;
}
.cap{
  display:flex;
  justify-content:center;
  align-items:center;
  height:48px;
  border-radius:10px;
  font-weight:900;
  font-size:18px;
}
.c1{background:#fff;color:#000}
.c2{background:#000;color:#fff}
.c3{background:#ef4444;color:#fff}
.c4{background:#2563eb;color:#fff}
.c5{background:#f59e0b;color:#000}
.c6{background:#16a34a;color:#fff}
.num-wrap{display:flex;flex-direction:column;gap:4px}
.num-input{
  width:100%;
  height:48px;
  border:none;
  border-radius:10px;
  background:#08101d;
  color:#fff;
  text-align:center;
  font-size:18px;
  font-weight:800;
  outline:none;
  border:1px solid #243352;
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:textfield;
}
.num-input::-webkit-outer-spin-button,
.num-input::-webkit-inner-spin-button{
  -webkit-appearance:none;
  margin:0;
}
.num-label{
  text-align:center;
  font-size:11px;
  color:var(--muted);
}
.comment{
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  background:#0d1628;
  border:1px solid #22304d;
}
.mark-view{
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  background:#0d1628;
  border:1px solid #22304d;
}
.mark-title{
  font-size:13px;
  font-weight:800;
  color:#dbeafe;
  margin-bottom:10px;
}
.mark-stage{
  position:relative;
  height:220px;
  border-radius:14px;
  background:
    radial-gradient(circle at 12% 50%, rgba(255,255,255,.04), transparent 22%),
    linear-gradient(180deg,#091220,#10203b);
  overflow:hidden;
  border:1px solid #26385c;
}
.mark-turn{
  position:absolute;
  left:28px;
  top:28px;
  width:150px;
  height:150px;
  border:3px solid rgba(255,255,255,.18);
  border-right:none;
  border-bottom:none;
  border-radius:150px 0 0 0;
}
.mark-guide{
  position:absolute;
  left:22px;
  top:165px;
  right:20px;
  height:1px;
  background:rgba(255,255,255,.12);
}
.mark-guide.v{
  left:92px;
  top:20px;
  width:1px;
  height:170px;
  background:rgba(255,255,255,.12);
}
.lane-boat{
  position:absolute;
  width:42px;
  height:42px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:18px;
  box-shadow:0 6px 16px rgba(0,0,0,.35);
  transition:all .35s ease;
  z-index:3;
}
.lane-boat.attack{
  box-shadow:0 0 0 3px rgba(245,158,11,.45), 0 8px 18px rgba(245,158,11,.25);
  transform:scale(1.08);
}
.arrow{
  position:absolute;
  height:3px;
  width:72px;
  background:linear-gradient(90deg,#67e8f9,#06b6d4);
  border-radius:3px;
  transform-origin:left center;
  display:none;
  z-index:2;
}
.arrow::after{
  content:"";
  position:absolute;
  right:-4px;
  top:-4px;
  border-left:10px solid #06b6d4;
  border-top:5px solid transparent;
  border-bottom:5px solid transparent;
}
.legend{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}
.legend-box{
  background:#0b1324;
  border:1px solid #243352;
  border-radius:10px;
  padding:8px 10px;
  font-size:12px;
  color:#dbeafe;
}
.small-note{
  font-size:12px;
  color:var(--muted);
  margin-top:8px;
}
</style>
</head>
<body>
<div class="app">

  <div class="card">
    <h1>1マーク展開AI PRO</h1>
    <div class="sub">
      矢印付きのプロUI版です。<br>
      ST・展示・M2・勝率から、1マークの攻め筋を自動表示します。
    </div>
  </div>

  <div class="card">
    <div class="head-grid">
      <div class="head-cell">艇</div>
      <div class="head-cell">ST</div>
      <div class="head-cell">展示</div>
      <div class="head-cell">M2</div>
      <div class="head-cell">勝率</div>
    </div>
    <div id="inputs"></div>
  </div>

  <div class="card">
    <div class="top-actions">
      <button class="small-btn clear-btn" onclick="clearInputs()">🗑 全クリア</button>
      <button class="small-btn" onclick="runAI()">🚤 展開予測</button>
    </div>
  </div>

  <div class="card result">
    <div id="result">結果待ち</div>

    <div id="markView" class="mark-view" style="display:none;">
      <div class="mark-title">1マーク展開イメージ</div>
      <div class="mark-stage">
        <div class="mark-turn"></div>
        <div class="mark-guide"></div>
        <div class="mark-guide v"></div>

        <div id="arrow1" class="arrow"></div>
        <div id="arrow2" class="arrow"></div>
        <div id="arrow3" class="arrow"></div>

        <div id="lane1" class="lane-boat c1">1</div>
        <div id="lane2" class="lane-boat c2">2</div>
        <div id="lane3" class="lane-boat c3">3</div>
        <div id="lane4" class="lane-boat c4">4</div>
        <div id="lane5" class="lane-boat c5">5</div>
        <div id="lane6" class="lane-boat c6">6</div>
      </div>

      <div class="legend">
        <div class="legend-box"><b>金枠</b>：攻め艇</div>
        <div class="legend-box"><b>矢印</b>：進行イメージ</div>
      </div>
      <div class="small-note">図は「イン逃げ / 差し / まくり・まくり差し」に応じて自動で切り替わります。</div>
    </div>
  </div>

</div>

<script>
function makeInputs(){
  let html = "";
  for(let i=1;i<=6;i++){
    html += `
      <div class="row-grid">
        <div class="cap c${i}">${i}</div>

        <div class="num-wrap">
          <input id="st${i}" class="num-input" type="text" inputmode="decimal" pattern="[0-9.]*" placeholder="0.13">
          <div class="num-label">ST</div>
        </div>

        <div class="num-wrap">
          <input id="tenji${i}" class="num-input" type="text" inputmode="decimal" pattern="[0-9.]*" placeholder="6.75">
          <div class="num-label">展示</div>
        </div>

        <div class="num-wrap">
          <input id="m2${i}" class="num-input" type="text" inputmode="decimal" pattern="[0-9.]*" placeholder="35.2">
          <div class="num-label">M2</div>
        </div>

        <div class="num-wrap">
          <input id="rate${i}" class="num-input" type="text" inputmode="decimal" pattern="[0-9.]*" placeholder="6.45">
          <div class="num-label">勝率</div>
        </div>
      </div>
    `;
  }
  document.getElementById("inputs").innerHTML = html;
}

function num(id){
  const v = parseFloat(document.getElementById(id).value);
  return isNaN(v) ? 0 : v;
}

function stPower(st){
  return st > 0 ? (0.20 - st) * 120 : 0;
}

function tenjiPower(t){
  return t > 0 ? (7 - t) * 18 : 0;
}

function clearInputs(){
  for(let i=1;i<=6;i++){
    document.getElementById("st"+i).value = "";
    document.getElementById("tenji"+i).value = "";
    document.getElementById("m2"+i).value = "";
    document.getElementById("rate"+i).value = "";
  }
  document.getElementById("result").innerHTML = "結果待ち";
  document.getElementById("markView").style.display = "none";

  for(let i=1;i<=6;i++){
    document.getElementById("lane"+i).classList.remove("attack");
  }
  ["arrow1","arrow2","arrow3"].forEach(id=>{
    document.getElementById(id).style.display = "none";
  });
}

function setBoatPos(id,left,top){
  const el = document.getElementById(id);
  el.style.left = left + "px";
  el.style.top = top + "px";
}

function setArrow(id,left,top,width,deg){
  const el = document.getElementById(id);
  el.style.display = "block";
  el.style.left = left + "px";
  el.style.top = top + "px";
  el.style.width = width + "px";
  el.style.transform = "rotate(" + deg + "deg)";
}

function resetMarkView(){
  const base = {
    1:{left:18, top:154},
    2:{left:72, top:154},
    3:{left:126, top:154},
    4:{left:180, top:154},
    5:{left:234, top:154},
    6:{left:288, top:154}
  };

  for(let i=1;i<=6;i++){
    setBoatPos("lane"+i, base[i].left, base[i].top);
    document.getElementById("lane"+i).classList.remove("attack");
  }

  ["arrow1","arrow2","arrow3"].forEach(id=>{
    document.getElementById(id).style.display = "none";
  });
}

function drawMarkView(scenario, attacker){
  const markView = document.getElementById("markView");
  markView.style.display = "block";
  resetMarkView();

  if(attacker){
    document.getElementById("lane"+attacker).classList.add("attack");
  }

  if(scenario === "イン逃げ"){
    setBoatPos("lane1", 74, 40);
    setBoatPos("lane2", 126, 88);
    setBoatPos("lane3", 176, 112);

    setArrow("arrow1", 30, 138, 68, -55);
    setArrow("arrow2", 86, 142, 64, -35);
    setArrow("arrow3", 140, 146, 62, -20);
  }

  if(scenario === "差し"){
    setBoatPos("lane2", 86, 56);
    setBoatPos("lane1", 136, 84);
    setBoatPos("lane3", 190, 110);

    setArrow("arrow1", 84, 138, 70, -78);
    setArrow("arrow2", 34, 142, 66, -42);
    setArrow("arrow3", 142, 146, 60, -18);
  }

  if(scenario.indexOf("まくり") >= 0){
    const atk = attacker === 4 ? 4 : 3;

    if(atk === 3){
      setBoatPos("lane3", 90, 34);
      setBoatPos("lane1", 150, 82);
      setBoatPos("lane2", 210, 108);

      setArrow("arrow1", 136, 142, 84, -65);
      setArrow("arrow2", 34, 142, 72, -20);
      setArrow("arrow3", 88, 142, 82, -70);
    } else {
      setBoatPos("lane4", 94, 26);
      setBoatPos("lane1", 152, 84);
      setBoatPos("lane2", 214, 112);

      setArrow("arrow1", 190, 140, 92, -78);
      setArrow("arrow2", 34, 142, 72, -20);
      setArrow("arrow3", 86, 142, 86, -72);
    }
  }
}

function runAI(){
  const boats = [];

  for(let i=1;i<=6;i++){
    boats.push({
      boat:i,
      st:num("st"+i),
      tenji:num("tenji"+i),
      m2:num("m2"+i),
      rate:num("rate"+i)
    });
  }

  const one   = boats[0];
  const two   = boats[1];
  const three = boats[2];
  const four  = boats[3];

  const inEscape =
    one.rate * 8 +
    one.m2 * 0.5 +
    stPower(one.st) +
    tenjiPower(one.tenji);

  const sashi =
    two.rate * 6 +
    two.m2 * 0.4 +
    stPower(two.st) +
    tenjiPower(two.tenji);

  const makuri3 =
    three.rate * 5 +
    three.m2 * 0.4 +
    stPower(three.st) +
    tenjiPower(three.tenji);

  const makuri4 =
    four.rate * 6 +
    four.m2 * 0.5 +
    stPower(four.st) +
    tenjiPower(four.tenji);

  const makuri = Math.max(makuri3, makuri4);

  let scenario = "イン逃げ";
  let attacker = 1;

  if(inEscape < sashi && sashi > makuri){
    scenario = "差し";
    attacker = 2;
  } else if(makuri > inEscape){
    scenario = "まくり/まくり差し";
    attacker = (makuri4 > makuri3) ? 4 : 3;
  }

  const risk = Math.max(0, sashi + makuri - inEscape);

  let riskText = "低";
  let riskClass = "good";
  if(risk > 50){
    riskText = "高";
    riskClass = "warn";
  } else if(risk > 25){
    riskText = "中";
    riskClass = "tip";
  }

  let order = "1-2-3";
  if(scenario === "差し") order = "2-1-3";
  if(scenario.indexOf("まくり") >= 0){
    order = attacker + "-1-2";
  }

  let comment = "";
  if(scenario === "イン逃げ"){
    comment = "①が先マイして押し切る展開。";
  } else if(scenario === "差し"){
    comment = "②が差して①を捕らえる展開。";
  } else {
    comment = attacker + "が外から攻めて1マークの形を崩す展開。";
  }

  document.getElementById("result").innerHTML = `
    <div class="badge tip">展開タイプ：${scenario}</div>
    <div class="badge gold">攻め艇：${attacker}号艇</div>
    <div class="badge ${riskClass}">危険度：${riskText}</div>
    <div class="comment">
      <b>1マーク通過予想：</b> ${order}<br>
      <b>コメント：</b> ${comment}
    </div>
  `;

  drawMarkView(scenario, attacker);
}

makeInputs();
</script>
</body>
</html>
