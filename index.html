<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BOAT RACE 1マーク展開AI</title>
<style>
body{margin:0;background:#0b1220;color:#fff;font-family:sans-serif}
.app{max-width:420px;margin:auto;padding:12px}
.card{background:#121c33;padding:12px;margin:10px 0;border-radius:12px}
input,select,button{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:none}
button{background:#2563eb;color:#fff;font-weight:bold}
.grid{display:grid;grid-template-columns:40px repeat(4,1fr);gap:6px;margin-top:6px}
.cap{display:flex;justify-content:center;align-items:center;border-radius:6px;font-weight:bold}
.c1{background:#fff;color:#000}.c2{background:#000}.c3{background:#ef4444}.c4{background:#2563eb}.c5{background:#f59e0b;color:#000}.c6{background:#16a34a}
.result{line-height:1.7}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;margin:4px;font-weight:bold}
.good{background:#16a34a}.warn{background:#dc2626}.tip{background:#2563eb}
</style>
</head>
<body>
<div class="app">

<div class="card">
<h3>1マーク展開AI</h3>
</div>

<div class="card">
<div class="grid">
<div>艇</div><div>ST</div><div>展示</div><div>M2</div><div>勝率</div>
</div>
<div id="inputs"></div>
</div>

<div class="card">
<button onclick="runAI()">展開予測</button>
</div>

<div class="card result" id="result">結果待ち</div>

</div>

<script>

function makeInputs(){
let html="";
for(let i=1;i<=6;i++){
html+=`
<div class="grid">
<div class="cap c${i}">${i}</div>
<input id="st${i}" placeholder="ST">
<input id="tenji${i}" placeholder="展示">
<input id="m2${i}" placeholder="M2">
<input id="rate${i}" placeholder="勝率">
</div>`;
}
document.getElementById("inputs").innerHTML=html;
}

function runAI(){

let boats=[];

for(let i=1;i<=6;i++){
boats.push({
boat:i,
st:parseFloat(document.getElementById("st"+i).value)||0,
tenji:parseFloat(document.getElementById("tenji"+i).value)||0,
m2:parseFloat(document.getElementById("m2"+i).value)||0,
rate:parseFloat(document.getElementById("rate"+i).value)||0
});
}

const one=boats[0];
const two=boats[1];
const three=boats[2];
const four=boats[3];

function stPower(st){return st>0?(0.20-st)*120:0;}
function tenjiPower(t){return t>0?(7-t)*18:0;}

const inEscape =
one.rate*8 + one.m2*0.5 + stPower(one.st) + tenjiPower(one.tenji);

const sashi =
two.rate*6 + two.m2*0.4 + stPower(two.st) + tenjiPower(two.tenji);

const makuri3 =
three.rate*5 + three.m2*0.4 + stPower(three.st) + tenjiPower(three.tenji);

const makuri4 =
four.rate*6 + four.m2*0.5 + stPower(four.st) + tenjiPower(four.tenji);

const makuri = Math.max(makuri3, makuri4);

let scenario="イン逃げ";
let attacker=1;

if(inEscape < sashi && sashi > makuri){
scenario="差し";
attacker=2;
}
else if(makuri > inEscape){
scenario="まくり/まくり差し";
attacker = (makuri4>makuri3)?4:3;
}

const risk = Math.max(0, sashi + makuri - inEscape);

let riskText="低";
if(risk>50) riskText="高";
else if(risk>25) riskText="中";

let order="1-2-3";

if(scenario==="差し") order="2-1-3";
if(scenario.indexOf("まくり")>=0) order=attacker+"-1-2";

let comment="";

if(scenario==="イン逃げ"){
comment="①が先マイして押し切る展開。";
}
if(scenario==="差し"){
comment="②が差しで①を捕らえる展開。";
}
if(scenario.indexOf("まくり")>=0){
comment=attacker+"が攻めて外から展開を作る。";
}

document.getElementById("result").innerHTML=
"<b>展開タイプ：</b>"+scenario+"<br>"+
"<b>攻め艇：</b>"+attacker+"号艇<br>"+
"<b>危険度：</b>"+riskText+"<br>"+
"<b>1マーク通過：</b>"+order+"<br><br>"+
"<div class='badge tip'>"+comment+"</div>";

}

makeInputs();

</script>
</body>
</html>
